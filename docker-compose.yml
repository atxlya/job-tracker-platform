services:
  postgres:
    image: postgres:17
    container_name: jobtracker-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: jobtracker-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      - postgres

volumes:
  postgres_data: